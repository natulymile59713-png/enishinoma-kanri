<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>縁の間 管理画面</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen" class="login-wrap">
  <div class="login-logo">縁の間 管理画面</div>
  <div class="login-tagline">運営者専用</div>
  <div class="login-card">
    <div class="login-title">ログイン</div>
    <div class="login-field">
      <label>メールアドレス</label>
      <input type="email" id="login-email" autocomplete="email">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="login-password" autocomplete="current-password">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn-primary" onclick="adminLogin()">ログイン</button>
    <div class="login-note">※管理者権限を持つアカウントのみログインできます</div>
  </div>
</div>

<!-- ===== ダッシュボード ===== -->
<div id="dashboard" style="display:none">
  <header class="topbar">
    <div class="brand">
      <div class="logo">縁の間</div>
      <div class="sub">管理画面</div>
    </div>
    <div class="user-info">
      <span id="admin-email"></span>
      <button class="btn-text" onclick="adminLogout()">ログアウト</button>
    </div>
  </header>
  <nav class="nav">
    <button class="nav-item active" data-section="contacts" onclick="showSection('contacts')">問い合わせ</button>
    <button class="nav-item" data-section="users" onclick="showSection('users')">ユーザー</button>
  </nav>
  <main>
    <div id="contacts-section" class="section">
      <div class="section-header">
        <h2>問い合わせ一覧</h2>
        <button class="btn-text btn-refresh" onclick="loadContacts()">↻ 更新</button>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="open" onclick="filterContacts('open')">未対応 <span id="count-open" class="filter-count">0</span></button>
        <button class="filter-tab" data-filter="replied" onclick="filterContacts('replied')">対応済 <span id="count-replied" class="filter-count">0</span></button>
        <button class="filter-tab" data-filter="all" onclick="filterContacts('all')">全て <span id="count-all" class="filter-count">0</span></button>
      </div>
      <div id="contacts-list" class="contacts-list"></div>
    </div>

    <div id="users-section" class="section" style="display:none">
      <div class="section-header">
        <h2>ユーザー一覧</h2>
        <button class="btn-text btn-refresh" onclick="loadUsers()">↻ 更新</button>
      </div>
      <div class="filter-bar">
        <input type="text" id="user-search" class="search-input" placeholder="🔍 会員ID / ニックネーム / 電話番号で検索" oninput="filterUsers()">
        <div class="filter-tabs" style="margin-bottom:0">
          <button class="filter-tab active" data-userfilter="active" onclick="filterUsersByStatus('active')">利用中 <span id="ucount-active" class="filter-count">0</span></button>
          <button class="filter-tab" data-userfilter="banned" onclick="filterUsersByStatus('banned')">退会済 <span id="ucount-banned" class="filter-count">0</span></button>
          <button class="filter-tab" data-userfilter="all" onclick="filterUsersByStatus('all')">全て <span id="ucount-all" class="filter-count">0</span></button>
        </div>
      </div>
      <div id="users-list" class="users-list"></div>
    </div>
  </main>
</div>

<!-- ===== 詳細・返信モーダル ===== -->
<div id="contact-detail-modal" class="modal-bg">
  <div class="modal-card">
    <div class="modal-hd">
      <span class="modal-ttl">問い合わせ詳細</span>
      <button class="btn-text" onclick="closeDetail()">✕</button>
    </div>
    <div id="contact-detail-body"></div>
  </div>
</div>

<!-- ===== ユーザー詳細モーダル ===== -->
<div id="user-detail-modal" class="modal-bg">
  <div class="modal-card">
    <div class="modal-hd">
      <span class="modal-ttl">ユーザー詳細</span>
      <button class="btn-text" onclick="closeUserDetail()">✕</button>
    </div>
    <div id="user-detail-body"></div>
  </div>
</div>

<!-- ===== BANモーダル ===== -->
<div id="ban-modal" class="modal-bg">
  <div class="modal-card" style="max-width:480px">
    <div class="modal-hd">
      <span class="modal-ttl" id="ban-modal-title">退会処分</span>
      <button class="btn-text" onclick="closeBanModal()">✕</button>
    </div>
    <div id="ban-modal-body">
      <div class="warning-box">
        ⚠️ 退会処分後、このユーザーはログインできなくなり、登録された電話番号での再登録もできなくなります。
      </div>
      <div class="detail-row" style="margin-bottom:1rem">
        <div class="detail-label">対象</div>
        <div class="detail-value" id="ban-target-name">—</div>
      </div>
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:500">退会理由（必須・本人には表示されます）</label>
      <textarea class="reply-text" id="ban-reason" placeholder="例：規約違反のため、利用規約 第◯条に基づき..." style="min-height:90px"></textarea>
      <div class="send-error" id="ban-error"></div>
      <button class="btn-send" id="ban-confirm-btn" style="background:#C05050" onclick="confirmBan()">退会処分を実行する</button>
    </div>
  </div>
</div>

<script src="js/admin-app.js"></script>
</body>
</html>
