<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C9A96E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="縁の間">
<link rel="apple-touch-icon" href="icons/icon.svg">

<title>鑑定予約 - 縁の間</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page-wrap">
  <header class="hd">
    <div class="logo">縁の間</div>
    <div class="sub">鑑定予約カレンダー</div>
  </header>

  <main class="main">
    <div class="info-box">
      <strong>鑑定可能日時</strong><br>
      ✦ 水曜日〜土曜日<br>
      ✦ 10:00–11:30 / 12:00–13:30 / 14:00–15:30 / 16:00–17:30 / 18:00–19:30<br>
      （各枠1時間半、1日5枠）
    </div>

    <div class="cal-nav-row">
      <button class="cal-nav-btn" onclick="calPrev()">◀</button>
      <span class="cal-title" id="cal-title">—</span>
      <button class="cal-nav-btn" onclick="calNext()">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>

    <div class="slot-section" id="slot-section" style="display:none">
      <div class="slot-title" id="slot-date-title">—</div>
      <div class="slot-list" id="slot-list"></div>
    </div>
  </main>
</div>

<!-- ===== 予約フォームモーダル ===== -->
<div class="modal-bg" id="booking-modal">
  <div class="modal-card">
    <div class="modal-hd">
      <span class="modal-ttl">予約内容のご入力</span>
      <button class="modal-close" onclick="closeBooking()">✕</button>
    </div>
    <div class="booking-summary" id="booking-summary">—</div>
    <div class="fl">
      <label>受け方 <span class="required">*</span></label>
      <div class="att-toggle">
        <button type="button" class="att-btn" id="att-solo" onclick="setAttendance('solo')">1人で受ける</button>
        <button type="button" class="att-btn on" id="att-pair" onclick="setAttendance('pair')">2人で受ける</button>
      </div>
      <div id="pair-notice" class="pair-notice">⚠️ お相手さまと予約が重複しないようにお気をつけ下さい。<br>（どちらかお一人が予約して頂ければ大丈夫です。）</div>
    </div>
    <div class="fl">
      <label>鑑定方法 <span class="required">*</span></label>
      <div class="att-toggle">
        <button type="button" class="att-btn" id="method-taimen" onclick="setMethod('taimen')">対面</button>
        <button type="button" class="att-btn on" id="method-online" onclick="setMethod('online')">オンライン</button>
      </div>
    </div>
    <div class="partner-section-divider" id="self-divider">▼ あなたのご情報</div>
    <div class="fl"><label>お名前(カタカナ) <span class="required">*</span></label><input type="text" id="bk-name" placeholder="例：エニシ ハナコ"></div>
    <div class="fl"><label>会員ID <span class="required">*</span></label><input type="text" id="bk-member-id" placeholder="例：EN-12345678"></div>
    <div class="fl"><label>電話番号 <span class="required">*</span></label><input type="tel" id="bk-phone" placeholder="例：09012345678" inputmode="tel"></div>
    <div id="partner-fields">
      <div class="partner-section-divider">▼ パートナーのご情報</div>
      <div class="fl"><label>お名前(カタカナ) <span class="required">*</span></label><input type="text" id="bk-partner-name" placeholder="例：エニシ タロウ"></div>
      <div class="fl"><label>会員ID <span class="required">*</span></label><input type="text" id="bk-partner-member-id" placeholder="例：EN-12345678"></div>
      <div class="fl"><label>電話番号 <span class="required">*</span></label><input type="tel" id="bk-partner-phone" placeholder="例：09012345678" inputmode="tel"></div>
    </div>
    <div class="fl"><label>備考（任意）</label><textarea id="bk-notes" placeholder="アクセス手段・お聞きしたいこと等"></textarea></div>
    <div class="bk-error" id="bk-error"></div>
    <div class="bk-success" id="bk-success" style="display:none">✓ 予約を受け付けました</div>
    <button class="btn-primary" id="bk-submit-btn" onclick="submitBooking()">この内容で予約する</button>
  </div>
</div>

<script src="js/sentry-init.js"></script>
<script src="js/recaptcha-init.js"></script>
<script src="js/utils.js"></script>
<script src="js/booking.js"></script>
<script>
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js')
        .then(function(reg){ console.log('[sw] registered:', reg.scope); })
        .catch(function(err){ console.log('[sw] register failed:', err); });
    });
  }
</script>
</body>
</html>
